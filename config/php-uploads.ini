; Raise PHP upload limits so the onboarding media uploads work.
; Plugin-side limits (fge_onboarding_media_limits): logo 1 MB, cover/gallery 5 MB each, up to 6 gallery photos.
; upload_max_filesize gives a little headroom per file; post_max_size must hold a full gallery POST.
upload_max_filesize = 6M
post_max_size = 40M
max_file_uploads = 20
memory_limit = 256M
